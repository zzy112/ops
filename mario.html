<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Super Mario</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Press Start 2P',monospace}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#controls{position:fixed;bottom:20px;left:0;right:0;display:none;justify-content:space-between;padding:0 20px;z-index:10}
.ctrl-group{display:flex;gap:10px}
.ctrl-btn{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.4);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;touch-action:manipulation}
.ctrl-btn:active{background:rgba(255,255,255,0.5)}
#jumpBtn{width:70px;height:70px;font-size:16px}
@media(pointer:coarse){#controls{display:flex}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="controls">
<div class="ctrl-group">
<div class="ctrl-btn" id="leftBtn">&#9664;</div>
<div class="ctrl-btn" id="rightBtn">&#9654;</div>
</div>
<div class="ctrl-group">
<div class="ctrl-btn" id="jumpBtn">A</div>
</div>
</div>
<script>
// ===== GAME CONSTANTS =====
const TILE=32,GRAVITY=0.6,JUMP_FORCE=-11,MOVE_SPEED=4,MAX_FALL=12;
const COLORS={sky:'#5c94fc',ground:'#c84c0c',groundTop:'#00a800',brick:'#c84c0c',brickLine:'#e09050',question:'#e09050',questionMark:'#fff',coin:'#ffd700',pipe:'#00a800',pipeDark:'#008000',mario:'#e00000',marioSkin:'#fca044',marioPants:'#0000a8',goomba:'#c84c0c',goombaDark:'#8b3000',flag:'#00a800',flagPole:'#888',white:'#fff',black:'#000'};
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
let W,H,scale=1;

function resize(){
  const r=window.innerWidth/window.innerHeight;
  if(r>256/240){H=Math.min(window.innerHeight,480);W=H*(256/240)}
  else{W=Math.min(window.innerWidth,512);H=W*(240/256)}
  W=Math.floor(W);H=Math.floor(H);
  canvas.width=W;canvas.height=H;
  scale=W/256;
}
resize();window.addEventListener('resize',resize);

// ===== INPUT =====
const keys={};
document.addEventListener('keydown',e=>{keys[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault()});
document.addEventListener('keyup',e=>{keys[e.code]=false});

// Touch controls
function bindTouch(id,code){
  const el=document.getElementById(id);
  if(!el)return;
  el.addEventListener('touchstart',e=>{e.preventDefault();keys[code]=true},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();keys[code]=false},{passive:false});
  el.addEventListener('touchcancel',e=>{keys[code]=false});
}
bindTouch('leftBtn','ArrowLeft');bindTouch('rightBtn','ArrowRight');bindTouch('jumpBtn','Space');

// ===== GAME STATE =====
let state='title'; // title, playing, dead, gameover, win
let score=0,coins=0,lives=3,cameraX=0,deathTimer=0,winTimer=0;
let player,enemies,items,particles,level;

// ===== LEVEL DATA =====
// Tile types: 0=air,1=ground,2=brick,3=question,4=pipe_tl,5=pipe_tr,6=pipe_bl,7=pipe_br,8=flag,9=used_question
const LEVEL_W=210,LEVEL_H=15;
function buildLevel(){
  const m=[];
  for(let y=0;y<LEVEL_H;y++){m[y]=[];for(let x=0;x<LEVEL_W;x++)m[y][x]=0}
  // Ground
  for(let x=0;x<LEVEL_W;x++){
    if((x>=69&&x<=71)||(x>=86&&x<=88))continue; // gaps
    m[13][x]=1;m[14][x]=1;
  }
  // Pipes
  const pipes=[[28,2],[38,3],[46,4],[57,4],[163,2]];
  pipes.forEach(([px,ph])=>{
    for(let py=13-ph;py<13;py++){m[py][px]=6;m[py][px+1]=7}
    m[13-ph][px]=4;m[13-ph][px+1]=5;
  });
  // Question blocks
  [[16,9],[21,9],[22,5],[23,9],[24,9],[78,9],[94,5],[106,9],[109,9],[112,9],[109,5],[129,9],[130,9]].forEach(([x,y])=>{m[y][x]=3});
  // Bricks
  [[20,9],[22,9],[24,5],[77,9],[79,9],[80,9],[91,5],[92,5],[93,5],[94,5],[95,5],[96,5],[97,5],[98,5],[100,5],[101,5],[102,5],[103,5],[118,9],[119,9],[120,9],[121,5],[122,5],[123,5],[128,9],[131,9],[129,5],[130,5],[168,9],[169,9]].forEach(([x,y])=>{m[y][x]=2});
  // Stairs near end
  for(let i=0;i<8;i++)for(let j=0;j<=i;j++)m[12-j][134+i]=1;
  for(let i=0;i<4;i++)for(let j=0;j<=i;j++)m[12-j][148-i]=1;
  for(let i=0;i<8;i++)for(let j=0;j<=i;j++)m[12-j][155+i]=1;
  // Flagpole
  m[4][198]=8;for(let y=5;y<13;y++)m[y][198]=8;
  return m;
}

// ===== ENTITIES =====
function createPlayer(){
  return{x:3*TILE,y:11*TILE,w:14,h:16,vx:0,vy:0,dir:1,grounded:false,frame:0,frameTimer:0,invincible:0,dead:false};
}

function createEnemies(){
  return[
    {x:22*TILE,y:12*TILE-16,w:16,h:16,vx:-1,alive:true,frame:0,frameTimer:0,squishTimer:0},
    {x:40*TILE,y:12*TILE-16,w:16,h:16,vx:-1,alive:true,frame:0,frameTimer:0,squishTimer:0},
    {x:51*TILE,y:12*TILE-16,w:16,h:16,vx:-1,alive:true,frame:0,frameTimer:0,squishTimer:0},
    {x:80*TILE,y:12*TILE-16,w:16,h:16,vx:-1,alive:true,frame:0,frameTimer:0,squishTimer:0},
    {x:97*TILE,y:12*TILE-16,w:16,h:16,vx:-1,alive:true,frame:0,frameTimer:0,squishTimer:0},
    {x:110*TILE,y:12*TILE-16,w:16,h:16,vx:-1,alive:true,frame:0,frameTimer:0,squishTimer:0},
    {x:120*TILE,y:12*TILE-16,w:16,h:16,vx:-1,alive:true,frame:0,frameTimer:0,squishTimer:0},
    {x:130*TILE,y:12*TILE-16,w:16,h:16,vx:-1,alive:true,frame:0,frameTimer:0,squishTimer:0},
    {x:170*TILE,y:12*TILE-16,w:16,h:16,vx:-1,alive:true,frame:0,frameTimer:0,squishTimer:0},
  ];
}

function initGame(){
  level=buildLevel();player=createPlayer();enemies=createEnemies();items=[];particles=[];
  cameraX=0;
}

// ===== COLLISION =====
function tileAt(x,y){
  const tx=Math.floor(x/TILE),ty=Math.floor(y/TILE);
  if(tx<0||tx>=LEVEL_W||ty<0||ty>=LEVEL_H)return ty>=13?1:0;
  return level[ty][tx];
}
function isSolid(t){return t===1||t===2||t===3||t===4||t===5||t===6||t===7||t===9}

function collideWorld(e){
  e.grounded=false;
  // Horizontal
  if(e.vx!==0){
    const nx=e.x+e.vx;
    const left=nx,right=nx+e.w-1,top=e.y+1,bot=e.y+e.h-1;
    const check=[top,e.y+e.h/2,bot];
    let blocked=false;
    for(const cy of check){
      if(e.vx>0&&isSolid(tileAt(right,cy))){blocked=true;break}
      if(e.vx<0&&isSolid(tileAt(left,cy))){blocked=true;break}
    }
    if(!blocked)e.x=nx;
    else if(e.vx>0)e.x=Math.floor((e.x+e.w)/TILE)*TILE-e.w;
    else e.x=Math.floor(e.x/TILE)*TILE;
  }
  // Vertical
  e.vy=Math.min(e.vy+GRAVITY,MAX_FALL);
  const ny=e.y+e.vy;
  if(e.vy>0){
    const bot=ny+e.h;
    const left=e.x+2,right=e.x+e.w-3;
    if(isSolid(tileAt(left,bot))||isSolid(tileAt(right,bot))){
      e.y=Math.floor(bot/TILE)*TILE-e.h;e.vy=0;e.grounded=true;
    }else e.y=ny;
  }else if(e.vy<0){
    const top=ny;
    const left=e.x+2,right=e.x+e.w-3;
    let hitBlock=false;
    for(const cx of[left,right]){
      const tx=Math.floor(cx/TILE),ty=Math.floor(top/TILE);
      const t=level[ty]?level[ty][tx]:0;
      if(isSolid(t)){
        hitBlock=true;
        if(t===3){
          level[ty][tx]=9;
          items.push({type:'coin',x:tx*TILE+8,y:ty*TILE-TILE,vy:-6,life:30});
          coins++;score+=200;
        }else if(t===2){
          particles.push({x:tx*TILE,y:ty*TILE,vx:-2,vy:-5,life:20});
          particles.push({x:tx*TILE+16,y:ty*TILE,vx:2,vy:-5,life:20});
          particles.push({x:tx*TILE,y:ty*TILE+16,vx:-1,vy:-3,life:20});
          particles.push({x:tx*TILE+16,y:ty*TILE+16,vx:1,vy:-3,life:20});
          level[ty][tx]=0;score+=50;
        }
        break;
      }
    }
    if(hitBlock){e.y=Math.floor(e.y/TILE)*TILE;e.vy=0}
    else e.y=ny;
  }else e.y=ny;
  // Fall into pit
  if(e.y>LEVEL_H*TILE+TILE)return true;
  return false;
}

// ===== UPDATE =====
function update(){
  if(state==='dead'){
    deathTimer--;
    if(deathTimer<=0){
      lives--;
      if(lives<=0){state='gameover';deathTimer=180}
      else{state='playing';initGame()}
    }
    return;
  }
  if(state==='gameover'){deathTimer--;if(deathTimer<=0){state='title';score=0;coins=0;lives=3}return}
  if(state==='win'){winTimer--;if(winTimer<=0)state='title';return}
  if(state!=='playing')return;

  const p=player;
  // Input
  p.vx=0;
  if(keys['ArrowLeft']||keys['KeyA']){p.vx=-MOVE_SPEED;p.dir=-1}
  if(keys['ArrowRight']||keys['KeyD']){p.vx=MOVE_SPEED;p.dir=1}
  if((keys['Space']||keys['ArrowUp']||keys['KeyW'])&&p.grounded){p.vy=JUMP_FORCE;p.grounded=false}

  // Animation
  if(p.vx!==0){p.frameTimer++;if(p.frameTimer>5){p.frame=(p.frame+1)%3;p.frameTimer=0}}else{p.frame=0}
  if(p.invincible>0)p.invincible--;

  // Physics
  const fell=collideWorld(p);
  if(fell){playerDie();return}
  if(p.x<0)p.x=0;

  // Camera
  const targetCam=p.x-W/scale/2+p.w/2;
  cameraX=Math.max(0,Math.min(targetCam,(LEVEL_W*TILE)-W/scale));

  // Enemies
  enemies.forEach(e=>{
    if(!e.alive)return;
    if(e.squishTimer>0){e.squishTimer--;if(e.squishTimer<=0)e.alive=false;return}
    e.frameTimer++;if(e.frameTimer>10){e.frame=(e.frame+1)%2;e.frameTimer=0}
    // Only update if near camera
    if(Math.abs(e.x-cameraX)<W/scale+100){
      e.vy=(e.vy||0)+GRAVITY;
      e.vy=Math.min(e.vy,MAX_FALL);
      e.x+=e.vx;e.y+=e.vy;
      // Ground collision for enemy
      const bot=e.y+e.h;
      const left=e.x+2,right=e.x+e.w-3;
      if(isSolid(tileAt(left,bot))||isSolid(tileAt(right,bot))){
        e.y=Math.floor(bot/TILE)*TILE-e.h;e.vy=0;
      }
      // Wall collision
      if(isSolid(tileAt(e.x,e.y+4))||isSolid(tileAt(e.x,e.y+e.h-4)))e.vx=1;
      if(isSolid(tileAt(e.x+e.w,e.y+4))||isSolid(tileAt(e.x+e.w,e.y+e.h-4)))e.vx=-1;
      // Player collision
      if(p.invincible<=0&&!p.dead){
        if(p.x<e.x+e.w&&p.x+p.w>e.x&&p.y<e.y+e.h&&p.y+p.h>e.y){
          if(p.vy>0&&p.y+p.h-e.y<12){
            // Stomp
            e.squishTimer=15;e.vx=0;p.vy=JUMP_FORCE*0.6;score+=100;
          }else{playerDie()}
        }
      }
    }
  });

  // Items
  items=items.filter(it=>{
    it.life--;
    if(it.type==='coin'){it.y+=it.vy;it.vy+=0.3}
    return it.life>0;
  });

  // Particles
  particles=particles.filter(pt=>{
    pt.life--;pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.4;
    return pt.life>0;
  });

  // Flag check
  if(tileAt(p.x+p.w/2,p.y+p.h/2)===8){
    state='win';winTimer=180;score+=1000;
  }
}

function playerDie(){
  player.dead=true;state='dead';deathTimer=90;
}

// ===== DRAW =====
function drawTile(tx,ty,t){
  const x=tx*TILE-cameraX,y=ty*TILE;
  if(x<-TILE||x>W/scale+TILE)return;
  const s=TILE;
  if(t===1){
    ctx.fillStyle=COLORS.ground;ctx.fillRect(x,y,s,s);
    if(ty>0&&!isSolid(level[ty-1]?level[ty-1][tx]:0)){
      ctx.fillStyle=COLORS.groundTop;ctx.fillRect(x,y,s,4);
    }
  }else if(t===2){
    ctx.fillStyle=COLORS.brick;ctx.fillRect(x,y,s,s);
    ctx.strokeStyle=COLORS.brickLine;ctx.lineWidth=1;
    ctx.strokeRect(x+1,y+1,s/2-1,s/2-1);ctx.strokeRect(x+s/2,y+1,s/2-1,s/2-1);
    ctx.strokeRect(x+1,y+s/2,s-2,s/2-1);
  }else if(t===3){
    ctx.fillStyle=COLORS.question;ctx.fillRect(x,y,s,s);
    ctx.fillStyle=COLORS.questionMark;ctx.font=(s*0.6)+'px monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('?',x+s/2,y+s/2+2);
  }else if(t===9){
    ctx.fillStyle='#886644';ctx.fillRect(x,y,s,s);
    ctx.fillStyle='#664422';ctx.fillRect(x+4,y+4,s-8,s-8);
  }else if(t===4||t===5){
    ctx.fillStyle=COLORS.pipe;ctx.fillRect(x,y,s,s);
    if(t===4){ctx.fillStyle=COLORS.pipeDark;ctx.fillRect(x,y,4,s)}
    if(t===5){ctx.fillStyle=COLORS.pipeDark;ctx.fillRect(x+s-4,y,4,s)}
    ctx.fillStyle='#44cc44';ctx.fillRect(x,y,s,6);
  }else if(t===6||t===7){
    ctx.fillStyle=COLORS.pipe;ctx.fillRect(x,y,s,s);
    if(t===6){ctx.fillStyle=COLORS.pipeDark;ctx.fillRect(x,y,4,s)}
    if(t===7){ctx.fillStyle=COLORS.pipeDark;ctx.fillRect(x+s-4,y,4,s)}
  }else if(t===8){
    ctx.fillStyle=COLORS.flagPole;ctx.fillRect(x+s/2-2,y,4,s);
    if(ty===4){
      ctx.fillStyle=COLORS.flag;
      ctx.beginPath();ctx.moveTo(x+s/2+2,y+2);ctx.lineTo(x+s/2+18,y+10);ctx.lineTo(x+s/2+2,y+18);ctx.fill();
    }
  }
}

function drawMario(p){
  const x=Math.round(p.x-cameraX),y=Math.round(p.y);
  if(p.invincible>0&&Math.floor(p.invincible/3)%2===0)return;
  const d=p.dir;
  // Body
  ctx.fillStyle=COLORS.mario;
  ctx.fillRect(x+3,y,8,4); // hat
  ctx.fillRect(x+1,y+4,12,4); // head area
  ctx.fillStyle=COLORS.marioSkin;
  ctx.fillRect(x+2,y+4,6,4); // face
  ctx.fillStyle=COLORS.mario;
  ctx.fillRect(x+2,y+8,10,6); // shirt
  ctx.fillStyle=COLORS.marioPants;
  ctx.fillRect(x+2,y+12,10,4); // pants
  // Eyes
  ctx.fillStyle=COLORS.black;
  if(d>0)ctx.fillRect(x+7,y+5,2,2);
  else ctx.fillRect(x+5,y+5,2,2);
}

function drawGoomba(e){
  const x=Math.round(e.x-cameraX),y=Math.round(e.y);
  if(x<-20||x>W/scale+20)return;
  if(e.squishTimer>0){
    ctx.fillStyle=COLORS.goomba;ctx.fillRect(x,y+12,16,4);return;
  }
  ctx.fillStyle=COLORS.goomba;
  ctx.fillRect(x+2,y,12,8); // head
  ctx.fillRect(x,y+4,16,8); // body
  ctx.fillStyle=COLORS.goombaDark;
  ctx.fillRect(x+2,y+12,5,4); // left foot
  ctx.fillRect(x+9,y+12,5,4); // right foot
  // Eyes
  ctx.fillStyle=COLORS.white;
  ctx.fillRect(x+3,y+3,4,4);ctx.fillRect(x+9,y+3,4,4);
  ctx.fillStyle=COLORS.black;
  ctx.fillRect(x+4,y+4,2,3);ctx.fillRect(x+10,y+4,2,3);
}

function drawHUD(){
  ctx.fillStyle=COLORS.white;
  ctx.font=Math.round(8*scale)+'px monospace';
  ctx.textAlign='left';
  const y=12*scale;
  ctx.fillText('MARIO',8*scale,y);
  ctx.fillText(String(score).padStart(6,'0'),8*scale,y+12*scale);
  ctx.textAlign='center';
  ctx.fillText('x'+coins,W/2-20*scale,y+12*scale);
  ctx.fillStyle=COLORS.coin;
  ctx.fillRect(W/2-32*scale,y+4*scale,8*scale,8*scale);
  ctx.fillStyle=COLORS.white;
  ctx.textAlign='center';
  ctx.fillText('WORLD',W/2+40*scale,y);
  ctx.fillText('1-1',W/2+40*scale,y+12*scale);
  ctx.textAlign='right';
  ctx.fillText('LIVES',W-8*scale,y);
  ctx.fillText('x '+lives,W-8*scale,y+12*scale);
}

function drawBackground(){
  // Sky
  ctx.fillStyle=COLORS.sky;ctx.fillRect(0,0,W,H);
  // Clouds (simple)
  ctx.fillStyle='rgba(255,255,255,0.8)';
  const cloudPositions=[[8,3],[19,2],[36,3],[52,2],[68,3],[85,2],[102,3],[130,2],[155,3],[180,2]];
  cloudPositions.forEach(([cx,cy])=>{
    const sx=cx*TILE-cameraX,sy=cy*TILE;
    if(sx>-80&&sx<W/scale+80){
      ctx.beginPath();
      ctx.arc(sx+16,sy+8,12,0,Math.PI*2);
      ctx.arc(sx+32,sy+4,16,0,Math.PI*2);
      ctx.arc(sx+48,sy+8,12,0,Math.PI*2);
      ctx.fill();
    }
  });
  // Hills
  ctx.fillStyle='#00a800';
  [[0,13],[48,13],[100,13],[160,13]].forEach(([hx,hy])=>{
    const sx=hx*TILE-cameraX,sy=hy*TILE;
    if(sx>-200&&sx<W/scale+200){
      ctx.beginPath();ctx.moveTo(sx,sy);
      ctx.quadraticCurveTo(sx+80,sy-60,sx+160,sy);ctx.fill();
    }
  });
}

function draw(){
  ctx.save();
  ctx.scale(scale,scale);
  drawBackground();
  // Tiles
  const startTx=Math.max(0,Math.floor(cameraX/TILE)-1);
  const endTx=Math.min(LEVEL_W,startTx+Math.ceil(W/scale/TILE)+3);
  for(let ty=0;ty<LEVEL_H;ty++)for(let tx=startTx;tx<endTx;tx++){
    const t=level[ty][tx];if(t!==0)drawTile(tx,ty,t);
  }
  // Items
  items.forEach(it=>{
    if(it.type==='coin'){
      ctx.fillStyle=COLORS.coin;
      ctx.fillRect(it.x-cameraX,it.y,12,12);
    }
  });
  // Particles
  ctx.fillStyle=COLORS.brick;
  particles.forEach(pt=>{ctx.fillRect(pt.x-cameraX,pt.y,8,8)});
  // Enemies
  enemies.forEach(e=>{if(e.alive)drawGoomba(e)});
  // Player
  if(state==='playing'||state==='win')drawMario(player);
  ctx.restore();
  // HUD
  drawHUD();
  // Overlays
  if(state==='title'){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle=COLORS.mario;ctx.font=Math.round(20*scale)+'px monospace';
    ctx.textAlign='center';ctx.fillText('SUPER MARIO',W/2,H*0.3);
    ctx.fillStyle=COLORS.white;ctx.font=Math.round(10*scale)+'px monospace';
    ctx.fillText('Press SPACE or Tap to Start',W/2,H*0.55);
    ctx.fillStyle=COLORS.coin;ctx.font=Math.round(8*scale)+'px monospace';
    ctx.fillText('Arrow Keys / WASD to Move',W/2,H*0.68);
    ctx.fillText('SPACE to Jump',W/2,H*0.76);
  }
  if(state==='dead'){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle=COLORS.white;ctx.font=Math.round(14*scale)+'px monospace';
    ctx.textAlign='center';ctx.fillText('OOPS!',W/2,H*0.45);
  }
  if(state==='gameover'){
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle=COLORS.mario;ctx.font=Math.round(16*scale)+'px monospace';
    ctx.textAlign='center';ctx.fillText('GAME OVER',W/2,H*0.45);
  }
  if(state==='win'){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle=COLORS.coin;ctx.font=Math.round(16*scale)+'px monospace';
    ctx.textAlign='center';ctx.fillText('STAGE CLEAR!',W/2,H*0.4);
    ctx.fillStyle=COLORS.white;ctx.font=Math.round(10*scale)+'px monospace';
    ctx.fillText('Score: '+score,W/2,H*0.55);
  }
}

// ===== GAME LOOP =====
function gameLoop(){
  if(state==='title'&&(keys['Space']||keys['Enter'])){
    state='playing';initGame();keys['Space']=false;keys['Enter']=false;
  }
  update();draw();
  requestAnimationFrame(gameLoop);
}
initGame();gameLoop();

// Tap to start on mobile
canvas.addEventListener('touchstart',()=>{
  if(state==='title'){state='playing';initGame()}
},{passive:true});
</script>
