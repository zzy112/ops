name: Build img2pdf

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  LIBREOFFICE_WIN_URL: "https://download.documentfoundation.org/libreoffice/portable/25.2.2/LibreOfficePortable_25.2.2_MultilingualStandard.paf.exe"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: img2pdf.exe
          - os: macos-latest
            platform: darwin/universal
            artifact: img2pdf.app
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install mupdf

      - name: Build
        working-directory: img2pdf
        run: wails build -platform ${{ matrix.platform }}

      # --- Bundle LibreOffice Portable (Windows) ---
      - name: Download LibreOffice Portable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $outDir = "img2pdf/build/bin"
          # Download portable installer
          Invoke-WebRequest -Uri "${{ env.LIBREOFFICE_WIN_URL }}" -OutFile "$outDir/LibreOfficePortable.exe"
          # Extract using 7z (silent extract)
          7z x "$outDir/LibreOfficePortable.exe" -o"$outDir/LibreOfficePortable" -y
          # Move the App/libreoffice folder next to exe
          Move-Item "$outDir/LibreOfficePortable/App/libreoffice" "$outDir/libreoffice"
          # Cleanup
          Remove-Item "$outDir/LibreOfficePortable" -Recurse -Force
          Remove-Item "$outDir/LibreOfficePortable.exe" -Force

      - name: Zip Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "img2pdf/build/bin/img2pdf.exe", "img2pdf/build/bin/libreoffice" -DestinationPath "img2pdf/build/bin/img2pdf-windows.zip"

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: img2pdf-windows
          path: img2pdf/build/bin/img2pdf-windows.zip

      # --- Bundle LibreOffice (macOS) ---
      - name: Install and bundle LibreOffice (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install --cask libreoffice
          # Copy LibreOffice into app bundle Resources
          mkdir -p "img2pdf/build/bin/img2pdf.app/Contents/Resources/libreoffice/program"
          cp -R /Applications/LibreOffice.app/Contents/MacOS/* "img2pdf/build/bin/img2pdf.app/Contents/Resources/libreoffice/program/"
          cp -R /Applications/LibreOffice.app/Contents/Frameworks "img2pdf/build/bin/img2pdf.app/Contents/Resources/libreoffice/"
          cp -R /Applications/LibreOffice.app/Contents/Resources "img2pdf/build/bin/img2pdf.app/Contents/Resources/libreoffice/share" || true

      - name: Zip macOS app
        if: runner.os == 'macOS'
        run: cd img2pdf/build/bin && zip -r -y img2pdf-macos.zip img2pdf.app

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: img2pdf-macos
          path: img2pdf/build/bin/img2pdf-macos.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            img2pdf-windows/img2pdf-windows.zip
            img2pdf-macos/img2pdf-macos.zip
          generate_release_notes: true
